name: Release Stubs

on:
  push:
    branches: [main]
    paths: ["stubs/*/Live/**"]

  workflow_dispatch:
    inputs:
      version:
        description: "Live version to release (e.g. 12.3.6)"
        required: true
      post:
        description: "Post-release number (leave empty for initial release)"
        required: false

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: pypi
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Detect versions to release
        id: versions
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_VERSION: ${{ inputs.version }}
          INPUT_POST: ${{ inputs.post }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            # Manual dispatch — single version
            echo "versions=$INPUT_VERSION" >> "$GITHUB_OUTPUT"
            echo "post=$INPUT_POST" >> "$GITHUB_OUTPUT"
          else
            # Push trigger — find versions whose stubs changed in this commit
            versions=""
            post_map=""
            changed_versions=$(git diff --name-only HEAD~1 -- 'stubs/*/Live/' \
              | sed -n 's|^stubs/\([^/]*\)/Live/.*|\1|p' | sort -u)
            for version in $changed_versions; do
              [[ "$version" =~ ^[0-9]+\.[0-9]+(\.[0-9]+)?$ ]] || continue
              [ -f "stubs/$version/Live/__init__.pyi" ] || continue

              tag="v${version}"
              if ! gh release view "$tag" &>/dev/null; then
                # No release yet — initial release
                versions="${versions:+$versions }$version"
              else
                # Release exists — post-release
                post=1
                highest=$(pip index versions ableton-live-stubs 2>/dev/null \
                  | grep -Eo "${version}\.post[0-9]+" | sed "s/${version}\.post//" \
                  | sort -rn | head -1)
                if [ -n "$highest" ]; then
                  post=$((highest + 1))
                fi
                versions="${versions:+$versions }$version"
                post_map="${post_map:+$post_map }${version}=${post}"
              fi
            done
            echo "versions=$versions" >> "$GITHUB_OUTPUT"
            echo "post_map=$post_map" >> "$GITHUB_OUTPUT"
            echo "post=" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and release
        if: steps.versions.outputs.versions != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          post_map="${{ steps.versions.outputs.post_map }}"
          for version in ${{ steps.versions.outputs.versions }}; do
            # Determine post-release number (manual dispatch or auto-detected)
            post=""
            if [ -n "${{ steps.versions.outputs.post }}" ]; then
              post="${{ steps.versions.outputs.post }}"
            else
              for entry in $post_map; do
                if [ "${entry%%=*}" = "$version" ]; then
                  post="${entry#*=}"
                  break
                fi
              done
            fi

            post_arg=""
            [ -n "$post" ] && post_arg="--post $post"
            python tools/publish/build_package.py "$version" $post_arg

            # GitHub release
            tag="v${version}"
            pkg_version="${version}"
            [ -n "$post" ] && pkg_version="${version}.post${post}"
            zip_file="release/ableton-live-stubs-${pkg_version}.zip"

            # Determine if this is the latest Live version across all stubs
            latest_version=$(ls -d stubs/*/Live/ 2>/dev/null \
              | sed 's|stubs/||;s|/Live/||' \
              | grep -E '^[0-9]+\.[0-9]+(\.[0-9]+)?$' \
              | sort -V | tail -1)
            if [ "$version" = "$latest_version" ]; then
              pip_cmd="pip install ableton-live-stubs"
            else
              pip_cmd="pip install ableton-live-stubs==${pkg_version}"
            fi

            notes="Python type stubs for Ableton Live ${version}.

          Install via pip:
          \`\`\`
          ${pip_cmd}
          \`\`\`

          Or download the zip and add to your type checker's search path.
          See [README](https://github.com/PhotonicVelocity/LiveAPI#using-the-stubs) for details."

            if gh release view "$tag" &>/dev/null; then
              # Remove old zip assets, upload new one
              gh release view "$tag" --json assets -q '.assets[].name' \
                | grep '\.zip$' \
                | while read -r asset; do
                    gh release delete-asset "$tag" "$asset" --yes
                  done
              gh release upload "$tag" "$zip_file"
              gh release edit "$tag" --notes "$notes"
              echo "Updated release $tag with new assets (${pkg_version})"
            else
              latest_flag=""
              if [ "$version" != "$latest_version" ]; then
                latest_flag="--latest=false"
              fi
              gh release create "$tag" "$zip_file" \
                --title "Live ${version} API Stubs" \
                --notes "$notes" $latest_flag
              echo "Created release $tag"
            fi
          done

      - name: Publish to PyPI
        if: steps.versions.outputs.versions != ''
        uses: pypa/gh-action-pypi-publish@release/v1
